name: Ludwig CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    name: Python ${{ matrix.python-version }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        
    - name: Lint with ruff
      run: ruff check ludwig/
        
    - name: Type check with mypy
      run: mypy ludwig/ --ignore-missing-imports
      continue-on-error: true
        
    - name: Test imports
      run: |
        python -c "from ludwig import App, Database, Model; print('✅ Core imports')"
        python -c "from ludwig.iot import Robot, Alarm, Sensor, Light; print('✅ IoT imports')"
        python -c "from ludwig.ai import Assistant, Vision, Automator; print('✅ AI imports')"
        
    - name: Run tests
      run: pytest tests/ -v
      
    - name: Test CLI
      run: |
        ludwig version
        ludwig new test-project --template basic
        test -f test-project/app.py
        echo "✅ CLI working"

  # macOS and Windows basic tests
  platform-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    
    name: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install
      run: pip install -e .
        
    - name: Test imports
      run: python -c "from ludwig import App; print('OK')"
        os: [ubuntu-latest, windows-latest, macos-latest]
    name: Platform Test ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Test basic functionality
      run: |
        python --version
        python bin/ludwig help
        
    - name: Test framework import
      run: python -c "import sys; sys.path.append('src/frameworks'); import embedded_framework"

  # Documentation check
  docs:
    runs-on: ubuntu-latest
    name: Documentation
    steps:
    - uses: actions/checkout@v3
    
    - name: Check required files
      run: |
        test -f README.md
        test -f CONTRIBUTING.md
        test -f CONTRIBUTORS.md
        test -f CHANGELOG.md
        test -f docs/EMBEDDED_GUIDE.md
        test -f examples/embedded/README.md
        echo "✅ All documentation files exist"
