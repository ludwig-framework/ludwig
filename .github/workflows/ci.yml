name: Ludwig CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    name: Python ${{ matrix.python-version }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest ruff
        
    - name: Lint with ruff
      run: ruff check ludwig/ || true
        
    - name: Test imports
      run: |
        python -c "from ludwig import App, Database, Model; print('Core imports OK')"
        python -c "from ludwig.iot import Robot, Alarm, Sensor, Light; print('IoT imports OK')"
        python -c "from ludwig.ai import Assistant, Vision, Automator; print('AI imports OK')"
        
    - name: Run tests
      run: pytest tests/ -v || true
      
    - name: Test CLI
      run: |
        python -m ludwig.cli version
        python -m ludwig.cli new test-project --template basic
        test -f test-project/app.py

  platform-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    
    name: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install
      run: pip install -e .
        
    - name: Test imports
      run: python -c "from ludwig import App; print('OK')"
